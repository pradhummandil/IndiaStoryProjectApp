<body class="min-h-screen flex flex-col items-center justify-center font-body-md text-body-md overflow-x-hidden">
<!-- Subtle Texture Overlay -->
<div class="fixed inset-0 grain-texture z-[-1]"></div>
<!-- Background Decorative Element (Archival Journal Aesthetic) -->
<div class="fixed top-0 right-0 w-1/2 h-full opacity-10 pointer-events-none hidden md:block">
<div class="w-full h-full bg-cover bg-center" data-alt="A macro photograph of an ancient, weathered Sanskrit manuscript page on handmade paper. The lighting is warm and soft, highlighting the tactile fibers and sepia-toned ink. The style is sophisticated and archival, fitting a premium historical editorial brand. The color palette is composed of creams, parchment yellows, and deep earthy browns." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBjqnfTsVIuZGv1NhwI9zmG-szqyOKIl_Qy0ujo6NEVWn7ABQhhMOGr5VBR_fm4qvEU8gAVl523xwcZsxZUTW4Pv_eMuyVjjqDOtC1Amx0F6RTqZagJuGftY4H2lc0C3EmVhY-Gguolcgdo4Sj8-YQnwpPAmqVTCwVrO9EUBcgpzgmRag2c9_MnRxqvxb6t8JdQVwOQo89q6qJqISdkxRtzIMCZA0NlZj41nj2yV1g_R6ux2nriSgzkrw')"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] px-margin-mobile md:px-0 relative z-10 flex flex-col items-center">
<!-- Brand Identity / Header -->
<header class="mb-xxl text-center">
<div class="mb-md">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'wght' 200;">history_edu</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary tracking-tight mb-xs">
                Restore Access
            </h1>
<div class="w-16 h-[2px] bg-primary mx-auto opacity-40"></div>
</header>
<!-- Form Card (Level 1 Surface) -->
<section class="w-full bg-surface-container-lowest border border-surface-container-highest p-xl md:p-xxl rounded-lg editorial-shadow">
<p class="text-on-surface-variant font-body-md mb-xl leading-relaxed text-center">
                Enter your registered email to receive recovery instructions.
            </p>
<form action="#" class="space-y-lg" method="POST">
<!-- Input Field Group -->
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-secondary-container uppercase tracking-widest px-xs" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="w-full bg-white border border-[#2D2926]/20 rounded px-md py-3 font-body-md text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" id="email" name="email" placeholder="e.g. curator@heritage.org" required="" type="email"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-white py-4 px-xl rounded-lg font-label-lg text-label-lg hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm shadow-sm" type="submit">
<span>Send Recovery Link</span>
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 300;">arrow_forward</span>
</button>
</form>
</section>
<!-- Footer / Back to Login -->
<footer class="mt-xl w-full text-center">
<a class="inline-flex items-center gap-xs font-label-lg text-label-lg text-primary hover:underline transition-all" href="#">
<span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
<span>Back to Login</span>
</a>
<p class="mt-xxl text-[10px] font-label-sm text-on-surface-variant/40 uppercase tracking-[0.2em]">
                © 2024 The India Story Project • Archival Access
            </p>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const submitBtn = document.querySelector('button[type="submit"]');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined animate-spin text-[20px]">sync</span>
                    <span>Processing...</span>
                `;
                
                // Simulate network delay
                setTimeout(() => {
                    submitBtn.classList.remove('bg-primary-container');
                    submitBtn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                    submitBtn.innerHTML = `
                        <span class="material-symbols-outlined text-[20px]">check_circle</span>
                        <span>Link Dispatched</span>
                    `;
                }, 1500);
            });

            // Focus micro-interaction
            const input = document.getElementById('email');
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('translate-x-1');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('translate-x-1');
            });
        });
    </script>
</body></html>

<style>
        body {
            background-color: #F8F5EF; /* Warm Paper Base */
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .paper-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            z-index: 1;
        }

        .royal-gradient {
            background: linear-gradient(180deg, rgba(139, 30, 30, 0) 0%, rgba(139, 30, 30, 0.03) 100%);
        }

        .fade-in {
            animation: fadeIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .letter-spacing-widest {
            letter-spacing: 0.25em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wordmark-reveal {
            animation: wordmarkAnim 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes wordmarkAnim {
            from { opacity: 0; letter-spacing: 0.5em; filter: blur(10px); }
            to { opacity: 1; letter-spacing: 0.15em; filter: blur(0); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }

        .line-draw {
            width: 0;
            animation: lineExpand 1.2s cubic-bezier(0.65, 0, 0.35, 1) 0.8s forwards;
        }

        @keyframes lineExpand {
            from { width: 0; }
            to { width: 80px; }
        }
    </style>

<body class="font-body-md text-on-surface selection:bg-primary/20">

<!-- Background Atmospheric Layer -->

                HERITAGE

<!-- Tagline -->
<div class="mt-lg fade-in" style="animation-delay: 1s;">

                    Traversing thousands of years of culture and history.

<span class="font-label-sm text-label-sm uppercase tracking-[0.3em] text-on-surface-variant mb-xs">Begin Journey</span>

<!-- Interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 100;
            const moveY = (e.clientY - window.innerHeight / 2) / 100;
            
            // Subtle parallax for the main text
            const h1 = document.querySelector('h1');
            if (h1) {
                h1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Redirect or transition simulation
        const beginBtn = document.querySelector('button');
        beginBtn.addEventListener('click', () => {
            document.body.style.transition = 'opacity 1s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                // In a real app, this would route to /home
                alert("Entering the Archives of India...");
                document.body.style.opacity = '1';
            }, 1000);
        });
    </script>

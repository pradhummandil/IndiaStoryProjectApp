name: mobile
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Networking
  dio: ^5.7.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.3.0

  # Messaging / maps / media
  firebase_messaging: ^15.1.3

  # Media helpers
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.8
  material_color_utilities: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
